<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>다봐줄순없잖아 — 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F5F7;color:#1A1A2E;min-height:100vh}
  :root{
    --primary:#E50914;--primary-bg:#FEF0F0;
    --navy:#1A1A2E;--green:#1A6E3C;--amber:#B8860B;--red:#C0392B;
    --gray-100:#F4F5F7;--gray-200:#E8EAF0;--gray-400:#9FA3B0;--gray-600:#5A5F72;--gray-800:#1A1A2E;
  }
  header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:700}
  header span{font-size:12px;opacity:0.7;margin-left:auto}
  .container{max-width:720px;margin:0 auto;padding:20px 16px}
  .section{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .section-title{font-size:13px;font-weight:700;color:var(--gray-400);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--gray-100);border-radius:12px;padding:14px 12px;text-align:center}
  .stat-num{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
  .stat-label{font-size:11px;color:var(--gray-400);margin-top:4px}

  .bar-row{margin-bottom:14px}
  .bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-label{font-weight:600;color:var(--gray-800)}
  .bar-info{color:var(--gray-400)}
  .bar-track{background:var(--gray-200);border-radius:99px;height:8px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease;background:var(--primary)}

  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px}
  .badge-data{background:var(--primary-bg);color:var(--primary)}

  /* 비밀번호 화면 */
  #gate{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
  #gate h2{font-size:17px;font-weight:700;color:var(--navy)}
  #gate p{font-size:12px;color:var(--gray-400)}
  #gate input{border:1.5px solid var(--gray-200);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;width:220px;text-align:center}
  #gate input:focus{border-color:var(--primary)}
  #gate button{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  #gate .err{font-size:12px;color:var(--red);min-height:16px}

  .dtable{width:100%;border-collapse:collapse;font-size:11px}
  .dtable th{text-align:left;padding:6px 4px;border-bottom:2px solid var(--gray-200);color:var(--gray-400);font-weight:600}
  .dtable td{padding:6px 4px;border-bottom:1px solid var(--gray-200);color:var(--gray-800)}
  .dtable tr:hover td{background:var(--gray-100)}
  .dtable .r{text-align:right}

  .chip{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;margin:2px}
  .chip-genre{background:#F0F0F5;color:var(--gray-600)}
  .chip-spoiler{background:#FFF3E0;color:#E65100}
  .chip-clean{background:#E8F5EE;color:var(--green)}

  .rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-200)}
  .rank-row:last-child{border-bottom:none}
  .rank-num{font-size:14px;font-weight:800;color:var(--primary);width:24px;text-align:center;flex-shrink:0}
  .rank-info{flex:1;min-width:0}
  .rank-title{font-size:13px;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
  .rank-val{font-size:12px;font-weight:700;color:var(--gray-600);flex-shrink:0}

  .home-link{font-size:12px;color:var(--gray-400);text-decoration:none;display:block;text-align:center;margin-top:8px}
  .home-link:hover{color:var(--primary)}
  .updated{font-size:11px;color:var(--gray-400);text-align:right;margin-top:12px}
</style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div style="font-size:32px">🎬</div>
  <h2>다봐줄순없잖아</h2>
  <p>관리자 전용 대시보드</p>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">입장</button>
  <div class="err" id="pw-err"></div>
</div>

<!-- 대시보드 본문 -->
<div id="dashboard" style="display:none">
  <header>
    <div>🎬</div>
    <h1>다봐줄순없잖아 — 대시보드</h1>
    <span id="last-updated"></span>
  </header>

  <div class="container">

    <!-- 콘텐츠 현황 -->
    <div class="section">
      <div class="section-title">📊 콘텐츠 현황 <span class="badge badge-data">FEED</span></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">총 영상</div></div>
        <div class="stat"><div class="stat-num" id="s-movies">—</div><div class="stat-label">영화 수</div></div>
        <div class="stat"><div class="stat-num" id="s-channels">—</div><div class="stat-label">채널 수</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-views">—</div><div class="stat-label">총 조회수</div></div>
        <div class="stat"><div class="stat-num" id="s-avg-views">—</div><div class="stat-label">평균 조회수</div></div>
        <div class="stat"><div class="stat-num" id="s-avg-rating">—</div><div class="stat-label">평균 평점</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
        <div id="spoiler-chips"></div>
      </div>
    </div>

    <!-- 장르 분포 -->
    <div class="section">
      <div class="section-title">🎭 장르 분포</div>
      <div id="genre-bars">불러오는 중…</div>
    </div>

    <!-- 조회수 TOP 10 -->
    <div class="section">
      <div class="section-title">🔥 조회수 TOP 10</div>
      <div id="top-views">불러오는 중…</div>
    </div>

    <!-- 평점 TOP 10 -->
    <div class="section">
      <div class="section-title">⭐ 평점 TOP 10 (투표 50+)</div>
      <div id="top-rated">불러오는 중…</div>
    </div>

    <!-- 채널 TOP 15 -->
    <div class="section">
      <div class="section-title">📺 채널 TOP 15</div>
      <div id="top-channels">불러오는 중…</div>
    </div>

    <!-- 연도별 분포 -->
    <div class="section">
      <div class="section-title">📅 개봉 연도 분포 (최근 10년)</div>
      <div id="year-bars">불러오는 중…</div>
    </div>

    <!-- 최근 추가 영상 -->
    <div class="section">
      <div class="section-title">🆕 최근 추가 영상 (20건)</div>
      <div id="recent-list">불러오는 중…</div>
    </div>

    <a class="home-link" href="/">← 홈으로</a>
    <div class="updated" id="footer-updated"></div>
  </div>
</div>

<script>
const PW_KEY = 'dwia-dash-auth';
const CORRECT = 'dwia2024';

function checkPw(){
  const v = document.getElementById('pw-input').value;
  if(v === CORRECT){
    sessionStorage.setItem(PW_KEY,'1');
    document.getElementById('gate').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadAll();
  } else {
    document.getElementById('pw-err').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
  }
}

if(sessionStorage.getItem(PW_KEY)==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

function fmtNum(n){
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return (n/10000).toFixed(1)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'천';
  return n.toLocaleString();
}

async function loadAll(){
  try {
    const r = await fetch('/data/feed.json');
    const d = await r.json();
    const items = d.items;
    render(items);
    const now = new Date().toLocaleTimeString('ko-KR');
    document.getElementById('last-updated').textContent = now;
    document.getElementById('footer-updated').textContent = '데이터 기준: feed.json · ' + now;
  } catch(e){
    console.error(e);
  }
}

function render(items){
  // ── 기본 통계 ──
  const movieIds = new Set(items.map(it=>it.movie.tmdb_id));
  const channels = new Set(items.map(it=>it.video.channel));
  const views = items.map(it=>it.video.view_count||0);
  const totalViews = views.reduce((a,b)=>a+b,0);
  const ratings = items.filter(it=>it.movie.vote_average>0).map(it=>it.movie.vote_average);
  const avgRating = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length) : 0;
  const spoilerCount = items.filter(it=>it.video.has_spoiler).length;

  document.getElementById('s-total').textContent = items.length.toLocaleString();
  document.getElementById('s-movies').textContent = movieIds.size.toLocaleString();
  document.getElementById('s-channels').textContent = channels.size.toLocaleString();
  document.getElementById('s-views').textContent = fmtNum(totalViews);
  document.getElementById('s-avg-views').textContent = fmtNum(Math.round(totalViews/items.length));
  document.getElementById('s-avg-rating').textContent = avgRating.toFixed(1);

  const cleanPct = Math.round((items.length-spoilerCount)/items.length*100);
  document.getElementById('spoiler-chips').innerHTML =
    `<span class="chip chip-spoiler">결말포함 ${spoilerCount}건 (${Math.round(spoilerCount/items.length*100)}%)</span>` +
    `<span class="chip chip-clean">스포없음 ${items.length-spoilerCount}건 (${cleanPct}%)</span>`;

  // ── 장르 분포 ──
  const genres = {};
  items.forEach(it => (it.movie.genres||[]).forEach(g => genres[g]=(genres[g]||0)+1));
  const genreSorted = Object.entries(genres).sort((a,b)=>b[1]-a[1]);
  const genreMax = genreSorted[0]?.[1]||1;
  const colors = ['#E50914','#B20710','#831010','#FF5733','#C70039','#900C3F','#581845','#2C3E50','#1A6E3C','#B8860B','#4A148C','#0D47A1','#00695C','#E65100','#546E7A'];

  document.getElementById('genre-bars').innerHTML = genreSorted.map(([g,c],i) => {
    const pct = Math.round(c/genreMax*100);
    return `<div class="bar-row">
      <div class="bar-top"><span class="bar-label">${g}</span><span class="bar-info">${c}건</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div>
    </div>`;
  }).join('');

  // ── 조회수 TOP 10 ──
  const topViews = [...items].sort((a,b)=>(b.video.view_count||0)-(a.video.view_count||0)).slice(0,10);
  document.getElementById('top-views').innerHTML = topViews.map((it,i) => `
    <div class="rank-row">
      <div class="rank-num">${i+1}</div>
      <div class="rank-info">
        <div class="rank-title">${it.movie.title_ko} (${it.movie.year||''})</div>
        <div class="rank-sub">${it.video.channel} · ${it.video.duration_label||''}</div>
      </div>
      <div class="rank-val">${fmtNum(it.video.view_count||0)}</div>
    </div>
  `).join('');

  // ── 평점 TOP 10 (투표 50건 이상) ──
  const rated = items.filter(it=>it.movie.vote_average>0 && it.movie.vote_count>=50);
  // 영화 중복 제거 (tmdb_id 기준, 최고 평점)
  const ratedMap = {};
  rated.forEach(it => {
    const id = it.movie.tmdb_id;
    if(!ratedMap[id] || it.movie.vote_average > ratedMap[id].movie.vote_average) ratedMap[id]=it;
  });
  const topRated = Object.values(ratedMap).sort((a,b)=>b.movie.vote_average-a.movie.vote_average).slice(0,10);
  document.getElementById('top-rated').innerHTML = topRated.map((it,i) => `
    <div class="rank-row">
      <div class="rank-num">${i+1}</div>
      <div class="rank-info">
        <div class="rank-title">${it.movie.title_ko} (${it.movie.year||''})</div>
        <div class="rank-sub">${(it.movie.genres||[]).join(' · ')} · 투표 ${it.movie.vote_count}건</div>
      </div>
      <div class="rank-val" style="color:var(--primary);">★ ${it.movie.vote_average.toFixed(1)}</div>
    </div>
  `).join('');

  // ── 채널 TOP 15 ──
  const chMap = {};
  items.forEach(it => {
    const ch = it.video.channel;
    if(!chMap[ch]) chMap[ch] = {count:0, totalViews:0};
    chMap[ch].count++;
    chMap[ch].totalViews += it.video.view_count||0;
  });
  const chSorted = Object.entries(chMap).sort((a,b)=>b[1].count-a[1].count).slice(0,15);
  const chMax = chSorted[0]?.[1].count||1;

  document.getElementById('top-channels').innerHTML = chSorted.map(([name,d]) => {
    const pct = Math.round(d.count/chMax*100);
    return `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:600;color:var(--gray-800);">${name}</span>
        <span style="font-size:12px;color:var(--gray-400);">${d.count}건 · 총 ${fmtNum(d.totalViews)}회</span>
      </div>
      <div style="background:var(--gray-200);border-radius:99px;height:6px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:var(--primary);border-radius:99px;transition:width 0.6s ease;"></div>
      </div>
    </div>`;
  }).join('');

  // ── 연도별 분포 ──
  const years = {};
  items.forEach(it => { const y=it.movie.year; if(y && y>=2016) years[y]=(years[y]||0)+1; });
  const yearSorted = Object.entries(years).sort((a,b)=>a[0]-b[0]);
  const yearMax = Math.max(...yearSorted.map(([,c])=>c),1);

  document.getElementById('year-bars').innerHTML = `
    <div style="display:flex;align-items:end;gap:4px;height:120px;padding:0 4px;">
      ${yearSorted.map(([y,c]) => {
        const h = Math.round(c/yearMax*100);
        const isThis = y==new Date().getFullYear();
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
          <div style="font-size:9px;font-weight:700;color:var(--gray-800);">${c}</div>
          <div style="width:100%;border-radius:4px 4px 0 0;background:${isThis?'var(--primary)':'var(--navy)'};height:${h}px;min-height:2px;transition:height 0.4s ease;"></div>
          <div style="font-size:9px;color:var(--gray-400);white-space:nowrap;">${String(y).slice(2)}</div>
        </div>`;
      }).join('')}
    </div>`;

  // ── 최근 추가 ──
  const recent = [...items].sort((a,b)=>(b.video.published_at||'').localeCompare(a.video.published_at||'')).slice(0,20);
  document.getElementById('recent-list').innerHTML = `<table class="dtable">
    <tr><th>영화</th><th>채널</th><th class="r">조회수</th><th class="r">게시일</th></tr>
    ${recent.map(it => {
      const d = it.video.published_at ? it.video.published_at.slice(5,10).replace('-','/') : '';
      return `<tr>
        <td style="font-weight:600;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${it.movie.title_ko}</td>
        <td style="max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${it.video.channel}</td>
        <td class="r">${fmtNum(it.video.view_count||0)}</td>
        <td class="r">${d}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

if(sessionStorage.getItem(PW_KEY)==='1') loadAll();
</script>
</body>
</html>
