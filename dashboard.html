<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>다봐줄순없잖아 — 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F5F7;color:#1A1A2E;min-height:100vh}
  :root{
    --primary:#E50914;--primary-bg:#FEF0F0;
    --navy:#1A1A2E;--green:#1A6E3C;--amber:#B8860B;--red:#C0392B;
    --gray-100:#F4F5F7;--gray-200:#E8EAF0;--gray-400:#9FA3B0;--gray-600:#5A5F72;--gray-800:#1A1A2E;
  }
  header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:700}
  header span{font-size:12px;opacity:0.7;margin-left:auto}
  .container{max-width:720px;margin:0 auto;padding:20px 16px}
  .section{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .section-title{font-size:13px;font-weight:700;color:var(--gray-400);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--gray-100);border-radius:12px;padding:14px 12px;text-align:center}
  .stat-num{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
  .stat-label{font-size:11px;color:var(--gray-400);margin-top:4px}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px}
  .badge-live{background:#E8F5EE;color:var(--green)}
  .refresh-btn{display:block;margin:8px auto 0;background:none;border:1px solid var(--gray-200);border-radius:10px;padding:7px 20px;font-size:12px;color:var(--gray-600);cursor:pointer;font-family:inherit}
  .refresh-btn:hover{background:var(--gray-100)}

  #gate{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
  #gate h2{font-size:17px;font-weight:700;color:var(--navy)}
  #gate p{font-size:12px;color:var(--gray-400)}
  #gate input{border:1.5px solid var(--gray-200);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;width:220px;text-align:center}
  #gate input:focus{border-color:var(--primary)}
  #gate button{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  #gate .err{font-size:12px;color:var(--red);min-height:16px}

  .dbtn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--gray-200);background:#fff;color:var(--gray-600);font-family:inherit}
  .dbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .daily-bar{display:flex;align-items:end;gap:4px;height:120px;padding:0 4px}
  .daily-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
  .daily-col .bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height 0.4s ease}
  .daily-col .lbl{font-size:9px;color:var(--gray-400);white-space:nowrap}
  .daily-col .val{font-size:9px;font-weight:700;color:var(--gray-800)}
  .cmp-card{background:var(--gray-100);border-radius:12px;padding:12px;text-align:center}
  .cmp-val{font-size:20px;font-weight:800;line-height:1}
  .cmp-label{font-size:10px;color:var(--gray-400);margin-top:4px}
  .cmp-diff{font-size:11px;font-weight:700;margin-top:4px}
  .cmp-up{color:var(--green)}.cmp-down{color:var(--red)}.cmp-flat{color:var(--gray-400)}
  .dtable{width:100%;border-collapse:collapse;font-size:11px}
  .dtable th{text-align:left;padding:6px 4px;border-bottom:2px solid var(--gray-200);color:var(--gray-400);font-weight:600}
  .dtable td{padding:6px 4px;border-bottom:1px solid var(--gray-200);color:var(--gray-800)}
  .dtable tr:hover td{background:var(--gray-100)}
  .dtable .r{text-align:right}
  .home-link{font-size:12px;color:var(--gray-400);text-decoration:none;display:block;text-align:center;margin-top:8px}
  .home-link:hover{color:var(--primary)}

  .bar-row{margin-bottom:12px}
  .bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-label{font-weight:600;color:var(--gray-800)}
  .bar-info{color:var(--gray-400)}
  .bar-track{background:var(--gray-200);border-radius:99px;height:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease;background:var(--primary)}
</style>
</head>
<body>

<div id="gate">
  <div style="font-size:32px">🎬</div>
  <h2>다봐줄순없잖아</h2>
  <p>관리자 전용 대시보드</p>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">입장</button>
  <div class="err" id="pw-err"></div>
</div>

<div id="dashboard" style="display:none">
  <header>
    <div>🎬</div>
    <h1>다봐줄순없잖아 — 대시보드</h1>
    <span id="last-updated"></span>
  </header>

  <div class="container">

    <!-- 일별 방문 차트 -->
    <div class="section">
      <div class="section-title">📅 일별 방문 추이 <span class="badge badge-live">LIVE</span></div>
      <div style="display:flex;gap:6px;margin-bottom:16px;">
        <button class="dbtn on" data-days="7" onclick="switchDays(7)">7일</button>
        <button class="dbtn" data-days="14" onclick="switchDays(14)">14일</button>
        <button class="dbtn" data-days="30" onclick="switchDays(30)">30일</button>
      </div>
      <div id="daily-chart" style="margin-bottom:16px;">불러오는 중…</div>
      <div id="daily-compare" style="margin-bottom:12px;"></div>
      <button class="refresh-btn" onclick="loadDaily()">↻ 새로고침</button>
    </div>

    <!-- 일별 상세 테이블 -->
    <div class="section">
      <div class="section-title">📋 일별 상세</div>
      <div id="daily-table"></div>
    </div>

    <!-- 오늘 요약 -->
    <div class="section">
      <div class="section-title">📊 오늘 요약 <span class="badge badge-live">LIVE</span></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-today-visit">—</div><div class="stat-label">오늘 방문</div></div>
        <div class="stat"><div class="stat-num" id="s-today-uv">—</div><div class="stat-label">순방문자</div></div>
        <div class="stat"><div class="stat-num" id="s-today-new">—</div><div class="stat-label">신규 방문</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-today-return">—</div><div class="stat-label">재방문</div></div>
        <div class="stat"><div class="stat-num" id="s-today-pwa">—</div><div class="stat-label">PWA 방문</div></div>
        <div class="stat"><div class="stat-num" id="s-today-install">—</div><div class="stat-label">홈설치 클릭</div></div>
      </div>
      <div id="today-return-rate" style="text-align:center;font-size:12px;color:var(--gray-600);margin-top:4px;"></div>
    </div>

    <!-- 누적 -->
    <div class="section">
      <div class="section-title">🏆 누적 현황</div>
      <div class="stat-grid" style="grid-template-columns:repeat(2,1fr);">
        <div class="stat"><div class="stat-num" id="s-total-visit">—</div><div class="stat-label">총 방문</div></div>
        <div class="stat"><div class="stat-num" id="s-total-uv">—</div><div class="stat-label">총 순방문자</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-total-new">—</div><div class="stat-label">신규 방문</div></div>
        <div class="stat"><div class="stat-num" id="s-total-return">—</div><div class="stat-label">재방문</div></div>
        <div class="stat"><div class="stat-num" id="s-total-install">—</div><div class="stat-label">홈설치 클릭</div></div>
      </div>
      <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
    </div>

    <!-- 이벤트별 통계 -->
    <div class="section">
      <div class="section-title">👆 이벤트별 통계</div>
      <div id="event-bars">불러오는 중…</div>
    </div>

    <!-- Vercel Analytics -->
    <div class="section" style="text-align:center;padding:16px;">
      <div style="font-size:12px;color:var(--gray-400);margin-bottom:8px;">상세 방문자 분석 (디바이스·지역·경로)</div>
      <a href="https://vercel.com/cheesecheesecheese95/movie-curation/analytics" target="_blank"
         style="display:inline-block;background:var(--primary);color:#fff;border-radius:12px;padding:10px 24px;font-size:13px;font-weight:700;text-decoration:none;">
        Vercel Analytics 보기 →
      </a>
    </div>

    <a class="home-link" href="/">← 홈으로</a>
  </div>
</div>

<script>
var PW_KEY='dwia-dash-auth', CORRECT='dwia2024';
var DAILY_DATA={}, DAILY_DAYS=7;

function checkPw(){
  var v=document.getElementById('pw-input').value;
  if(v===CORRECT){
    sessionStorage.setItem(PW_KEY,'1');
    document.getElementById('gate').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadAll();
  } else {
    document.getElementById('pw-err').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
  }
}
if(sessionStorage.getItem(PW_KEY)==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

function fmt(n){ return n>=10000?(n/10000).toFixed(1)+'만':n.toLocaleString(); }

// ── 오늘+누적 ──
async function loadSummary(){
  try{
    var r=await fetch('/api/track');
    var d=await r.json();
    var t=d.total||{}, td=d.today||{};

    document.getElementById('s-today-visit').textContent=fmt(td.visit||0);
    document.getElementById('s-today-uv').textContent=fmt(td.unique_visit||0);
    document.getElementById('s-today-new').textContent=fmt(td.new_visitor||0);
    document.getElementById('s-today-return').textContent=fmt(td.returning_visitor||0);
    document.getElementById('s-today-pwa').textContent=fmt(td.pwa_visit||0);
    document.getElementById('s-today-install').textContent=fmt(td.install_click||0);

    var todayTotal=(td.new_visitor||0)+(td.returning_visitor||0);
    var returnRate=todayTotal>0?Math.round((td.returning_visitor||0)/todayTotal*100):0;
    document.getElementById('today-return-rate').textContent='오늘 재방문율: '+returnRate+'%';

    document.getElementById('s-total-visit').textContent=fmt(t.visit||0);
    document.getElementById('s-total-uv').textContent=fmt(t.unique_visit||0);
    document.getElementById('s-total-new').textContent=fmt(t.new_visitor||0);
    document.getElementById('s-total-return').textContent=fmt(t.returning_visitor||0);
    document.getElementById('s-total-install').textContent=fmt(t.install_click||0);

    // 이벤트별 바 차트
    var EVENTS=[
      ['visit','방문'],['unique_visit','순방문자'],['new_visitor','신규'],['returning_visitor','재방문'],
      ['pwa_visit','PWA 방문'],['install_click','홈설치 클릭'],
      ['card_click','카드 클릭'],['video_play','영상 재생'],
      ['tab:feed','탭:피드'],['tab:today','탭:오늘'],['tab:search','탭:검색'],
    ];
    var max=Math.max.apply(null,EVENTS.map(function(e){return t[e[0]]||0}).concat([1]));
    var html=EVENTS.map(function(e){
      var val=t[e[0]]||0;
      var todayVal=td[e[0]]||0;
      var pct=Math.round(val/max*100);
      var todayBadge=todayVal>0?'<span style="font-size:10px;font-weight:700;color:var(--green);background:#E8F5EE;padding:1px 6px;border-radius:8px;margin-left:6px;">+'+todayVal+' 오늘</span>':'';
      return '<div class="bar-row"><div class="bar-top"><span class="bar-label">'+e[1]+todayBadge+'</span><span class="bar-info">'+fmt(val)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>';
    }).join('');
    document.getElementById('event-bars').innerHTML=html;

    var now=new Date().toLocaleTimeString('ko-KR');
    document.getElementById('last-updated').textContent=now;
  }catch(e){console.error(e);}
}

// ── 일별 차트 ──
function switchDays(n){
  DAILY_DAYS=n;
  document.querySelectorAll('.dbtn').forEach(function(b){b.className='dbtn'+(parseInt(b.dataset.days)===n?' on':'');});
  loadDaily();
}

async function loadDaily(){
  try{
    var r=await fetch('/api/track?mode=daily&days='+DAILY_DAYS);
    var d=await r.json();
    DAILY_DATA=d.daily||{};
    renderChart();
    renderCompare();
    renderTable();
  }catch(e){
    document.getElementById('daily-chart').innerHTML='<span style="color:var(--red)">불러오기 실패</span>';
  }
}

function fmtDate(s){var d=new Date(s+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate();}
function fmtDay(s){return['일','월','화','수','목','금','토'][new Date(s+'T00:00:00').getDay()];}
function getVal(date,key){return(DAILY_DATA[date]&&DAILY_DATA[date][key])||0;}

function renderChart(){
  var dates=Object.keys(DAILY_DATA).sort();
  if(!dates.length){document.getElementById('daily-chart').innerHTML='데이터 없음';return;}
  var visits=dates.map(function(d){return getVal(d,'visit');});
  var uvs=dates.map(function(d){return getVal(d,'unique_visit');});
  var max=Math.max.apply(null,visits.concat([1]));
  var today=new Date().toISOString().slice(0,10);

  var html='<div style="font-size:10px;color:var(--gray-400);margin-bottom:8px;display:flex;gap:12px;"><span><span style="display:inline-block;width:10px;height:10px;background:var(--primary);border-radius:2px;margin-right:4px;"></span>방문</span><span><span style="display:inline-block;width:10px;height:10px;background:var(--navy);border-radius:2px;margin-right:4px;opacity:0.4;"></span>순방문</span></div>';
  html+='<div class="daily-bar">'+dates.map(function(d,i){
    var v=visits[i],u=uvs[i];
    var hv=Math.round(v/max*100),hu=Math.round(u/max*100);
    var isToday=d===today;
    return '<div class="daily-col">'+
      '<div class="val">'+v+'</div>'+
      '<div style="width:100%;position:relative;height:'+hv+'px;">'+
        '<div style="position:absolute;bottom:0;left:0;right:0;height:'+hv+'px;background:'+(isToday?'var(--primary)':'var(--primary)')+';border-radius:4px 4px 0 0;opacity:0.3;"></div>'+
        '<div style="position:absolute;bottom:0;left:0;right:0;height:'+hu+'px;background:'+(isToday?'var(--primary)':'var(--primary)')+';border-radius:4px 4px 0 0;"></div>'+
      '</div>'+
      '<div class="lbl">'+fmtDate(d)+'</div>'+
      '<div class="lbl">'+fmtDay(d)+'</div>'+
    '</div>';
  }).join('')+'</div>';
  document.getElementById('daily-chart').innerHTML=html;
}

function renderCompare(){
  var today=new Date().toISOString().slice(0,10);
  var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  var lastWeek=new Date(Date.now()-7*86400000).toISOString().slice(0,10);

  function diff(cur,prev){
    if(prev===0&&cur===0)return '<div class="cmp-diff cmp-flat">—</div>';
    if(prev===0)return '<div class="cmp-diff cmp-up">NEW</div>';
    var d=cur-prev,pct=Math.round(d/prev*100);
    var cls=d>0?'cmp-up':d<0?'cmp-down':'cmp-flat';
    var s=d>0?'+':'';
    return '<div class="cmp-diff '+cls+'">'+s+d+' ('+s+pct+'%)</div>';
  }

  var tv=getVal(today,'visit'),yv=getVal(yesterday,'visit');
  var tu=getVal(today,'unique_visit'),yu=getVal(yesterday,'unique_visit');
  var tn=getVal(today,'new_visitor'),yn=getVal(yesterday,'new_visitor');
  var tr=getVal(today,'returning_visitor'),yr=getVal(yesterday,'returning_visitor');

  document.getElementById('daily-compare').innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;">'+
      '<div class="cmp-card"><div class="cmp-val">'+tv+'</div><div class="cmp-label">오늘 방문</div>'+diff(tv,yv)+'</div>'+
      '<div class="cmp-card"><div class="cmp-val">'+tu+'</div><div class="cmp-label">오늘 순방문</div>'+diff(tu,yu)+'</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">'+
      '<div class="cmp-card"><div class="cmp-val">'+tn+'</div><div class="cmp-label">오늘 신규</div>'+diff(tn,yn)+'</div>'+
      '<div class="cmp-card"><div class="cmp-val">'+tr+'</div><div class="cmp-label">오늘 재방문</div>'+diff(tr,yr)+'</div>'+
    '</div>'+
    '<div style="font-size:10px;color:var(--gray-400);margin-top:6px;text-align:right;">vs 전일 비교</div>';
}

function renderTable(){
  var dates=Object.keys(DAILY_DATA).sort().reverse();
  if(!dates.length){document.getElementById('daily-table').innerHTML='';return;}

  var html='<table class="dtable"><tr><th>날짜</th><th>요일</th><th class="r">방문</th><th class="r">순방문</th><th class="r">신규</th><th class="r">재방문</th><th class="r">재방문율</th><th class="r">PWA</th><th class="r">설치</th></tr>';
  var today=new Date().toISOString().slice(0,10);
  dates.forEach(function(d){
    var dd=DAILY_DATA[d];
    var v=dd.visit||0,u=dd.unique_visit||0,n=dd.new_visitor||0,r=dd.returning_visitor||0;
    var total=n+r;
    var rate=total>0?Math.round(r/total*100)+'%':'—';
    var pwa=dd.pwa_visit||0,inst=dd.install_click||0;
    var bold=d===today?'font-weight:700;':'';
    html+='<tr style="'+bold+'"><td>'+fmtDate(d)+'</td><td>'+fmtDay(d)+'</td><td class="r">'+v+'</td><td class="r">'+u+'</td><td class="r">'+n+'</td><td class="r">'+r+'</td><td class="r">'+rate+'</td><td class="r">'+pwa+'</td><td class="r">'+inst+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('daily-table').innerHTML=html;
}

function loadAll(){loadSummary();loadDaily();}

if(sessionStorage.getItem(PW_KEY)==='1') loadAll();
</script>
</body>
</html>
