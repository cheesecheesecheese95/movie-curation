name: Auto Tweet Movie
on:
  schedule:
    # 한국시간 08:00, 11:00, 14:00, 18:00, 21:00 (UTC 23:00, 02:00, 05:00, 09:00, 12:00)
    - cron: '0 23 * * *'
    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # 수동 실행

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tweepy
      - run: python scripts/tweet_movie.py
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      - name: Commit tweeted.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/tweeted.json
          git diff --cached --quiet || git commit -m "트윗 기록 업데이트"
          git push
