<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E50914"/>
      <stop offset="100%" style="stop-color:#FF4B4B"/>
    </linearGradient>
  </defs>
  <!-- Film strip icon -->
  <rect x="2" y="8" width="32" height="32" rx="4" fill="url(#accent)"/>
  <rect x="6" y="10" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="6" y="16" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="6" y="22" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="6" y="28" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="6" y="34" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="26" y="10" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="26" y="16" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="26" y="22" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="26" y="28" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <rect x="26" y="34" width="4" height="4" rx="1" fill="#0D0D0D" opacity="0.5"/>
  <!-- Play button in center -->
  <polygon points="15,17 15,31 25,24" fill="#fff"/>
  <!-- Text -->
  <text x="42" y="22" font-family="-apple-system,Arial,sans-serif" font-size="15" font-weight="900" fill="#F0F0F0" letter-spacing="-0.5">Don't</text>
  <text x="82" y="22" font-family="-apple-system,Arial,sans-serif" font-size="15" font-weight="900" fill="url(#accent)" letter-spacing="-0.5">Watch It All</text>
  <text x="42" y="38" font-family="-apple-system,Arial,sans-serif" font-size="10" font-weight="500" fill="#666" letter-spacing="0.5">영화, 다 볼 필요 없잖아</text>
</svg>
