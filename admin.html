<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWIA 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f5f5f5;color:#333;padding:16px;max-width:900px;margin:0 auto}
h1{font-size:18px;margin-bottom:16px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters select,.filters input{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff}
.filters input{flex:1;min-width:200px}
.stats{font-size:12px;color:#999;margin-bottom:12px}
.item{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.item img{width:120px;height:68px;object-fit:cover;border-radius:6px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:#999;margin-bottom:4px}
.item-match{font-size:12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.item-match .movie{font-weight:700;color:#E50914}
.item-match .conf{font-size:10px;padding:2px 6px;border-radius:4px;background:#f0f0f0}
.item-actions{display:flex;gap:6px;flex-shrink:0;flex-direction:column}
.btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-del{background:#fee;color:#c00}
.btn-del:hover{background:#fcc}
.btn-type{background:#eef;color:#009}
.btn-type:hover{background:#ccf}
.btn-save{background:#efe;color:#060}
.btn-save:hover{background:#cfc}
.edit-row{display:flex;gap:6px;margin-top:6px}
.edit-row input{padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px;flex:1}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;display:none;z-index:999}
</style>
</head>
<body>
<h1>🎬 DWIA 관리자 <button class="btn btn-save" onclick="exportChanges()" style="margin-left:12px;padding:8px 16px;font-size:12px">📥 변경사항 다운로드</button></h1>
<div class="filters">
  <select id="f-genre"><option value="">전체 장르</option></select>
  <select id="f-type">
    <option value="">전체 타입</option>
    <option value="summary">요약</option>
    <option value="review">리뷰</option>
    <option value="other">기타</option>
    <option value="null">미분류</option>
  </select>
  <select id="f-conf">
    <option value="">신뢰도</option>
    <option value="low">0.7 이하 (의심)</option>
    <option value="mid">0.7~0.9</option>
    <option value="high">0.9+</option>
  </select>
  <input id="f-search" placeholder="영화명 또는 영상 제목 검색...">
</div>
<div class="stats" id="stats"></div>
<div id="list"></div>
<div id="load-more" style="text-align:center;padding:20px;display:none">
  <button class="btn btn-save" onclick="showMore()" style="padding:10px 24px">더 보기</button>
</div>
<div class="toast" id="toast"></div>

<script>
var DATA=[],FILTERED=[],SHOWN=0,PAGE=30;
var CHANGES={};

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='';setTimeout(function(){t.style.display='none'},2000)}

function loadData(){
  fetch('data/feed.json').then(function(r){return r.json()}).then(function(d){
    DATA=d.items||[];
    buildGenreFilter();
    applyFilter();
  });
}

function buildGenreFilter(){
  var genres={};
  DATA.forEach(function(x){(x.movie.genres||[]).forEach(function(g){genres[g]=(genres[g]||0)+1})});
  var sel=document.getElementById('f-genre');
  Object.keys(genres).sort().forEach(function(g){
    var o=document.createElement('option');o.value=g;o.textContent=g+' ('+genres[g]+')';sel.appendChild(o);
  });
}

function applyFilter(){
  var genre=document.getElementById('f-genre').value;
  var type=document.getElementById('f-type').value;
  var conf=document.getElementById('f-conf').value;
  var q=document.getElementById('f-search').value.trim().toLowerCase();

  FILTERED=DATA.filter(function(x){
    if(genre&&(x.movie.genres||[]).indexOf(genre)<0)return false;
    if(type==='null'&&x.video.content_type)return false;
    if(type&&type!=='null'&&x.video.content_type!==type)return false;
    if(conf==='low'&&(x.video.match_confidence||0)>0.7)return false;
    if(conf==='mid'&&((x.video.match_confidence||0)<=0.7||(x.video.match_confidence||0)>0.9))return false;
    if(conf==='high'&&(x.video.match_confidence||0)<=0.9)return false;
    if(q){
      var title=(x.movie.title_ko||'').toLowerCase();
      var titleEn=(x.movie.title_en||'').toLowerCase();
      var vTitle=x.video.title.toLowerCase();
      if(title.indexOf(q)<0&&titleEn.indexOf(q)<0&&vTitle.indexOf(q)<0)return false;
    }
    return true;
  });

  document.getElementById('stats').textContent='총 '+FILTERED.length+'개 (전체 '+DATA.length+'개)';
  SHOWN=0;
  document.getElementById('list').innerHTML='';
  showMore();
}

function showMore(){
  var items=FILTERED.slice(SHOWN,SHOWN+PAGE);
  var html=items.map(function(x,i){
    var idx=SHOWN+i;
    var v=x.video,m=x.movie;
    var conf=v.match_confidence?v.match_confidence.toFixed(2):'?';
    var confClass=parseFloat(conf)>=0.9?'color:#090':parseFloat(conf)>=0.7?'color:#960':'color:#c00';
    return '<div class="item" id="item-'+idx+'">'+
      '<a href="https://www.youtube.com/watch?v='+v.id+'" target="_blank"><img src="https://img.youtube.com/vi/'+v.id+'/default.jpg" style="cursor:pointer"></a>'+
      '<div class="item-info">'+
        '<div class="item-title" title="'+v.title+'">'+v.title+'</div>'+
        '<div class="item-meta">'+v.channel+' · '+(v.duration_label||'')+'</div>'+
        '<div class="item-match">'+
          '<span class="movie">'+(m.title_ko||m.title_en||'미매칭')+'</span>'+
          '<span class="conf" style="'+confClass+'">신뢰도 '+conf+'</span>'+
          '<span style="font-size:10px;color:#999">'+(v.content_type||'미분류')+'</span>'+
          '<span style="font-size:10px;color:#999">'+(m.year||'')+'</span>'+
        '</div>'+
        '<div class="edit-row">'+
          '<input placeholder="영화 제목 수정" value="'+(m.title_ko||'')+'" id="edit-'+idx+'">'+
          '<button class="btn btn-save" onclick="saveTitle('+idx+')">저장</button>'+
        '</div>'+
        '<div class="edit-row">'+
          '<select id="genre-'+idx+'" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px">'+
            ['드라마','스릴러','액션','SF','코미디','공포','범죄','미스터리','로맨스','판타지','애니메이션','전쟁','다큐멘터리'].map(function(g){
              var sel=(m.genres||[]).indexOf(g)>=0?' selected':'';
              return '<option value="'+g+'"'+sel+'>'+g+'</option>';
            }).join('')+
          '</select>'+
          '<button class="btn btn-save" onclick="saveGenre('+idx+')">장르변경</button>'+
        '</div>'+
      '</div>'+
      '<div class="item-actions">'+
        '<button class="btn btn-del" onclick="deleteItem('+idx+')">삭제</button>'+
        '<button class="btn btn-type" onclick="toggleType('+idx+')">타입변경</button>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('list').insertAdjacentHTML('beforeend',html);
  SHOWN+=items.length;
  document.getElementById('load-more').style.display=SHOWN<FILTERED.length?'':'none';
}

function deleteItem(idx){
  var item=FILTERED[idx];
  if(!confirm(item.movie.title_ko+' — 이 영상을 삭제할까요?'))return;
  // DB에서 삭제 (로컬에서는 피드에서 제거)
  FILTERED.splice(idx,1);
  DATA=DATA.filter(function(x){return x.video.id!==item.video.id});
  CHANGES[item.video.id]='delete';
  document.getElementById('item-'+idx).remove();
  document.getElementById('stats').textContent='총 '+FILTERED.length+'개 (전체 '+DATA.length+'개)';
  toast('삭제됨: '+item.video.title.substring(0,30));
  savePending();
}

function toggleType(idx){
  var item=FILTERED[idx];
  var types=['summary','review','other'];
  var cur=types.indexOf(item.video.content_type);
  var next=types[(cur+1)%3];
  item.video.content_type=next;
  CHANGES[item.video.id]={type:next};
  document.getElementById('item-'+idx).querySelector('.item-match span:nth-child(3)').textContent=next;
  toast('타입 변경: '+next);
  savePending();
}

function saveTitle(idx){
  var item=FILTERED[idx];
  var newTitle=document.getElementById('edit-'+idx).value.trim();
  if(!newTitle)return;
  item.movie.title_ko=newTitle;
  CHANGES[item.video.id]=CHANGES[item.video.id]||{};
  CHANGES[item.video.id].title=newTitle;
  document.getElementById('item-'+idx).querySelector('.movie').textContent=newTitle;
  toast('제목 저장: '+newTitle);
  savePending();
}

function saveGenre(idx){
  var item=FILTERED[idx];
  var sel=document.getElementById('genre-'+idx);
  var newGenre=sel.value;
  item.movie.genres=[newGenre];
  CHANGES[item.video.id]=CHANGES[item.video.id]||{};
  CHANGES[item.video.id].genre=newGenre;
  toast('장르 변경: '+newGenre);
  savePending();
}

function savePending(){
  // 변경사항을 localStorage에 저장 (나중에 DB 반영용)
  localStorage.setItem('dwia_admin_changes',JSON.stringify(CHANGES));
  document.getElementById('stats').textContent='총 '+FILTERED.length+'개 (전체 '+DATA.length+'개) · 변경 '+Object.keys(CHANGES).length+'건 미반영';
}

// 필터 이벤트
document.getElementById('f-genre').addEventListener('change',applyFilter);
document.getElementById('f-type').addEventListener('change',applyFilter);
document.getElementById('f-conf').addEventListener('change',applyFilter);
var searchTimer;
document.getElementById('f-search').addEventListener('input',function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(applyFilter,300);
});

function exportChanges(){
  // 삭제할 video_id 목록 + 타입/제목 변경 목록을 JSON으로 다운로드
  var blob=new Blob([JSON.stringify(CHANGES,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='admin_changes_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  toast('변경사항 '+Object.keys(CHANGES).length+'건 다운로드됨');
}

loadData();
</script>
</body>
</html>
