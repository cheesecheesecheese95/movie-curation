<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#0D0D0D;color:#F0F0F0;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh}
.hd{position:relative;top:0;z-index:100;background:#0D0D0D;padding:14px 16px 0;padding-top:max(14px,env(safe-area-inset-top))}
.logo{font-size:15px;font-weight:900;margin-bottom:14px}
.logo em{font-style:normal;color:#E50914}
.tabs{display:flex;border-bottom:2px solid #242424}
.tabs button{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:700;color:#666;cursor:pointer;border:none;background:none;font-family:inherit}
.tabs button.on{color:#F0F0F0}
.top-sticky{position:fixed;top:0;left:0;right:0;z-index:100;background:#0D0D0D;max-width:480px;margin:0 auto}
.sticky-filter{padding-bottom:6px;background:#0D0D0D}
.content-area{padding-top:280px}
.chips{display:flex;flex-wrap:wrap;gap:4px;padding:8px 16px 4px}
.chips span{padding:5px 10px;border-radius:14px;font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid #242424;background:#1A1A1A;color:#999}
.chips span.on{background:#F0F0F0;color:#0D0D0D;border-color:#F0F0F0}
.info{padding:4px 16px 8px;font-size:12px;color:#666}
.list{padding:0 16px 80px}
.card{background:#1A1A1A;border-radius:14px;overflow:hidden;margin-bottom:14px;cursor:pointer}
.card-img{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.8);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
.card-sp{position:absolute;top:8px;left:8px;background:#E50914;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
.card-rec{position:absolute;top:8px;right:8px;background:rgba(255,180,0,.92);color:#1A1A1A;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px}
.card-bd{padding:12px 14px}
.card-row{display:flex;gap:10px;margin-bottom:8px}
.card-poster{width:44px;height:66px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#242424}
.card-poster img{width:100%;height:100%;object-fit:cover}
.card-info{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:800;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#999;display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.card-meta .star{color:#F1C40F;font-weight:700}
.card-rt{display:flex;gap:6px;margin-top:4px;font-size:10px;font-weight:600;flex-wrap:wrap}
.rt{padding:2px 6px;border-radius:4px}
.rt-t{background:rgba(1,210,119,.15);color:#01D277}
.rt-i{background:rgba(245,197,24,.15);color:#F5C518}
.rt-r{background:rgba(250,50,10,.15);color:#FA320A}
.rt-n{background:rgba(45,180,0,.15);color:#2DB400}
.card-ott{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.ott{font-size:9px;padding:2px 6px;border-radius:4px;background:#242424;color:#999}
.card-vt{font-size:12px;color:#999;line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-st{display:flex;gap:10px;font-size:11px;color:#666}
.player{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:none;flex-direction:column}
.player.on{display:flex}
.p-top{display:flex;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
.p-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
.p-frame{display:flex;align-items:center;justify-content:center}
.p-frame iframe{width:100%;max-width:480px;aspect-ratio:16/9;border:none;border-radius:8px}
.p-info{padding:16px;overflow-y:auto;flex:1}
.p-title{font-size:16px;font-weight:800;margin-bottom:4px}
.p-meta{font-size:12px;color:#999;margin-bottom:12px}
.search-box{padding:16px}
.search-box input{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid #242424;background:#1A1A1A;color:#F0F0F0;font-size:15px;font-family:inherit;outline:none}
.search-box input:focus{border-color:#E50914}
.empty{text-align:center;padding:60px 0;color:#666;font-size:13px}
.sbtn{padding:4px 8px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #242424;background:#1A1A1A;color:#666;font-family:inherit}
.sbtn.on{background:#2E2E2E;color:#F0F0F0;border-color:#666}
.ad-slot{min-height:0!important}.ad-slot:empty,.ad-slot ins[data-ad-status="unfilled"]{display:none}
.filter-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#0D0D0D;border-bottom:1px solid #1A1A1A}
.fbtn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #333;background:#1A1A1A;color:#999;font-family:inherit;white-space:nowrap}
.fbtn:active{background:#242424}
.fbtn.on{background:#F0F0F0;color:#0D0D0D;border-color:#F0F0F0}
.fbtn.genre-active{background:rgba(229,9,20,.15);color:#E50914;border-color:#E50914}
.fbtn-shuffle{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:16px;margin-left:auto}
.p-actions{display:flex;gap:8px;margin-top:12px}
.p-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #242424;background:#1A1A1A;color:#999;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.p-btn:active{background:#242424}
.p-btn.watched{background:#1A3D1A;color:#30D158;border-color:#30D158}
.new-dot{width:6px;height:6px;background:#E50914;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}
</style>
</head>
<body>
<div class="app">
  <div class="top-sticky">
  <div class="hd">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <a href="/" onclick="location.hash='';GENRE='전체';render();window.scrollTo(0,0);return false"><img src="/logo.svg" alt="Don't Watch It All" style="height:36px"></a>
      <div style="display:flex;gap:10px;align-items:center">
        <a href="#" id="install-btn" onclick="installApp();return false" style="font-size:11px;color:#F0F0F0;text-decoration:none;font-weight:600">📲 홈화면추가</a>
        <a href="#" onclick="document.getElementById('settings-modal').style.display='flex';return false" style="font-size:11px;color:#666;text-decoration:none">⚙️ 설정</a>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="on" data-tab="feed">오늘 뭐볼까</button>
      <button data-tab="today" id="tab-today">오늘 이거 어때</button>
      <button data-tab="search">영화 찾아줘</button>
    </div>
    <div class="sticky-filter">
      <div class="filter-bar">
        <div style="position:relative">
          <button class="fbtn" id="genre-btn" onclick="toggleGenreDropdown()">🎬 장르 ▾</button>
          <div id="genre-dropdown" style="display:none;position:absolute;top:calc(100% + 6px);left:0;background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:10px;z-index:200;width:240px;flex-wrap:wrap;gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.6)">
            <div class="chips" id="genres" style="padding:0"></div>
          </div>
        </div>
        <button class="fbtn" id="btn-spoiler" onclick="toggleSpoiler()">결말포함</button>
        <button class="fbtn" id="btn-unwatched" onclick="toggleUnwatched()">본 영상 제외</button>
        <button class="fbtn" onclick="reshuffleAndRender()" style="margin-left:auto">🔀 랜덤</button>
        <input type="checkbox" id="chk-spoiler" style="display:none">
        <input type="checkbox" id="chk-unwatched" style="display:none">
      </div>
      <div id="sort-btns" style="display:none"></div>
    </div>
  </div>
  </div><!-- /top-sticky -->

  <div id="v-feed" class="content-area">
    <div class="info" id="info"></div>
    <div class="list" id="list"></div>
  </div>

  <div id="v-today" class="content-area" style="display:none">
    <div class="list" id="today-list" style="padding-top:16px"></div>
  </div>

  <div id="v-search" class="content-area" style="display:none">
    <div class="search-box" style="position:relative">
      <input id="q" placeholder="영화 제목을 검색하세요..." autocomplete="off">
      <div id="q-suggest" style="display:none;position:absolute;top:100%;left:16px;right:16px;background:#1A1A1A;border:1px solid #333;border-radius:0 0 12px 12px;max-height:200px;overflow-y:auto;z-index:10"></div>
    </div>
    <div class="list" id="slist"></div>
  </div>

  <div class="player" id="player">
    <div class="p-top">
      <button class="p-close" id="p-close">✕</button>
      <span style="font-size:12px;color:#666" id="p-ch"></span>
    </div>
    <div class="p-frame"><iframe id="p-if" src="" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>
    <div class="p-info">
      <div class="p-title" id="p-t"></div>
      <div class="p-meta" id="p-m"></div>
      <!-- AI 추천평 -->
      <div id="p-review" style="display:none;margin-top:16px;background:#1A1A1A;border-radius:14px;padding:16px 18px;border:1px solid #242424">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="font-size:14px">📝</span><span style="font-size:13px;font-weight:800;color:#F0F0F0">큐레이터 한줄평</span></div>
        <div id="p-review-text" style="font-size:13px;color:#ccc;line-height:1.8"></div>
        <div style="margin-top:12px;font-size:10px;color:#444">AI가 영화 정보를 기반으로 작성한 추천평입니다</div>
      </div>
      <div class="p-actions">
        <button class="p-btn" id="p-watched" onclick="toggleWatchedPlayer()">✓ 봤어요</button>
        <button class="p-btn" onclick="shareMovie()">↗ 공유</button>
      </div>
      <div id="p-ad" class="ad-slot" style="margin-top:16px;min-height:0;overflow:hidden;"></div>
      <div style="margin-top:16px;font-size:13px;font-weight:700;color:#999;margin-bottom:8px">이 영화가 좋았다면</div>
      <div id="p-similar"></div>
      <button onclick="closePlayer()" style="width:100%;margin-top:16px;padding:14px;border-radius:12px;background:#1A1A1A;border:1px solid #242424;color:#999;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">← 뒤로가기</button>
    </div>
  </div>

  <!-- 홈화면추가 모달 -->
  <div id="install-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
    <div style="background:#1A1A1A;border-radius:16px;padding:24px;width:90%;max-width:360px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-size:16px;font-weight:800">📲 홈 화면에 추가</span>
        <button onclick="document.getElementById('install-modal').style.display='none'" style="background:none;border:none;color:#999;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="font-size:13px;color:#ccc;line-height:1.8">
        <div style="font-weight:700;color:#F0F0F0;margin-bottom:8px">iPhone (Safari)</div>
        <div>1. 하단 공유 버튼 <span style="font-size:16px">↑</span> 탭</div>
        <div>2. <strong>홈 화면에 추가</strong> 선택</div>
        <div style="font-weight:700;color:#F0F0F0;margin:12px 0 8px">Android (Chrome)</div>
        <div>1. 우측 상단 메뉴 <span style="font-size:16px">⋮</span> 탭</div>
        <div>2. <strong>홈 화면에 추가</strong> 선택</div>
      </div>
      <div style="margin-top:16px;font-size:11px;color:#666;text-align:center">앱 설치 없이 앱처럼 사용할 수 있어요!</div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div id="settings-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center" onclick="if(event.target===this)this.style.display='none'">
    <div style="background:#1A1A1A;border-radius:16px;padding:24px;width:90%;max-width:360px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-size:16px;font-weight:800">⚙️ 설정</span>
        <button onclick="document.getElementById('settings-modal').style.display='none'" style="background:none;border:none;color:#999;font-size:20px;cursor:pointer">✕</button>
      </div>
      <a href="/about.html" style="display:block;padding:14px 0;border-bottom:1px solid #2A2A2A;color:#F0F0F0;text-decoration:none;font-size:14px">📖 서비스 소개</a>
      <a href="/privacy.html" style="display:block;padding:14px 0;border-bottom:1px solid #2A2A2A;color:#F0F0F0;text-decoration:none;font-size:14px">🔒 개인정보처리방침</a>
      <a href="mailto:ourmovie@naver.com" style="display:block;padding:14px 0;color:#F0F0F0;text-decoration:none;font-size:14px">✉️ 문의하기 <span style="font-size:11px;color:#666">ourmovie@naver.com</span></a>
      <div style="padding:14px 0 0;font-size:11px;color:#555;border-top:1px solid #2A2A2A;">삼십칠점이 · 대표 김현애 · 506-45-00305<br>ourmovie@naver.com</div>
    </div>
  </div>
</div>

<script>
var DATA=[], CUR=[], GENRE='전체', TAB='feed', SORT='shuffle', SPOILER=false, UNWATCHED=false, SHOWN=0, PAGE=20, LOADING=false;
var WATCHED=JSON.parse(localStorage.getItem('dwia_watched')||'{}');
function isWatched(vid){return!!WATCHED[vid]}
function markWatched(vid){WATCHED[vid]=Date.now();localStorage.setItem('dwia_watched',JSON.stringify(WATCHED));}
function toggleWatched(vid){if(WATCHED[vid])delete WATCHED[vid];else WATCHED[vid]=Date.now();localStorage.setItem('dwia_watched',JSON.stringify(WATCHED));}

function fmt(n){return n>=10000?Math.round(n/10000)+'만':n>=1000?Math.round(n/1000)+'천':n+''}

function isRecommended(m){
  return m.naver_rating&&(m.vote_count||0)>=500;
}

function getPickComment(m,idx){
  var r=m.vote_average||0,gs=m.genres||[],g=gs[0]||'',y=m.year||2020,n=m.naver_rating,rt=m.rotten_tomatoes,imdb=m.imdb_rating,vc=m.vote_count||0;
  var ov=m.overview||'',age=2026-y;
  // 줄거리 기반 핵심 문장 추출 (첫 문장 또는 ~60자)
  var ovShort='';
  if(ov){
    var sentences=ov.replace(/\.\.\./g,'…').split(/[.!?。]\s*/);
    var s1=sentences[0]||'';
    if(s1.length>80) s1=s1.substring(0,77)+'…';
    ovShort=s1;
  }
  // 장르별 감상 포인트 (각 5개씩, 블로그 리뷰 톤)
  var gm={
    '스릴러':[
      '초반부터 불안한 기류가 흐르는데, 이게 결말까지 한 번도 풀리지 않습니다. 긴장을 즐기는 분이라면 꼭 보세요.',
      '중반 이후 반전이 시작되면 멈출 수가 없어요. "아, 그래서 그랬구나" 하는 순간이 짜릿합니다.',
      '심리전이 핵심인 영화예요. 배우들의 표정 연기를 보는 재미가 있습니다.',
      '단순한 서스펜스가 아니라 인간의 본성을 건드리는 이야기. 보고 나면 한참 생각하게 됩니다.',
      '러닝타임 내내 손에 땀을 쥐게 하는 전개. 스릴러 좋아하시면 후회 없을 영화입니다.'
    ],
    '액션':[
      '액션 신 하나하나가 정성이 느껴지는 영화. 극장에서 못 봤다면 큰 화면으로 보세요.',
      '주인공이 부딪히고 깨지면서도 앞으로 나아가는 모습에 카타르시스가 있어요.',
      '화려한 액션 뒤에 의외로 탄탄한 스토리가 숨어있습니다. 두 번 보면 더 재밌어요.',
      '스트레스 쌓인 날 이 영화 하나면 해소됩니다. 시원하게 질러주는 액션이 일품.',
      '요즘 보기 드문 정통 액션. CGI보다 실제 액션이 주는 묵직함이 다릅니다.'
    ],
    '드라마':[
      '잔잔하게 흐르다가 어느 순간 가슴이 먹먹해지는 영화. 여운이 오래 남습니다.',
      '대사 하나하나에 힘이 있어요. 특히 중반부 대화 장면은 두고두고 생각나는 명장면.',
      '화려하진 않지만 진심이 느껴지는 이야기. 조용한 밤에 혼자 보기 좋습니다.',
      '삶에 대해 다시 생각하게 만드는 영화. 가볍게 시작했다가 깊이 빠져들게 됩니다.',
      '감정을 억지로 끌어내지 않는데도 눈물이 나는 영화. 연기력의 힘을 느낄 수 있어요.'
    ],
    'SF':[
      '세계관이 정말 치밀합니다. 디테일을 하나씩 발견하는 재미가 있어요.',
      '과학적 상상력이 돋보이면서도 결국 인간의 이야기를 하고 있어서 공감이 됩니다.',
      '비주얼이 압도적인데 스토리도 허투루 하지 않았어요. SF 입문으로도 좋습니다.',
      '"만약 이런 세상이 온다면?" 상상하게 만드는 영화. 현실과의 연결고리가 섬뜩해요.',
      'SF의 틀을 빌렸지만 본질은 철학적인 질문. 생각이 많아지는 밤에 추천합니다.'
    ],
    '코미디':[
      '소리 내서 웃을 수 있는 영화가 요즘 드문데, 이 영화는 확실히 웃깁니다.',

function shuffle(arr){
  var a=arr.slice(),i=a.length,j,t;
  while(i>1){j=Math.floor(Math.random()*(i--));t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function render(){
  var items=GENRE==='전체'?DATA.slice():DATA.filter(function(x){return(x.movie.genres||[]).indexOf(GENRE)>=0});
  if(SPOILER)items=items.filter(function(x){return x.video.has_spoiler});
  if(UNWATCHED)items=items.filter(function(x){return!isWatched(x.video.id)});
  if(SORT==='shuffle')items=shuffle(items);
  else if(SORT==='views')items.sort(function(a,b){return(b.video.view_count||0)-(a.video.view_count||0)});
  else if(SORT==='rating')items.sort(function(a,b){return(b.movie.vote_average||0)-(a.movie.vote_average||0)});
  else if(SORT==='latest')items.sort(function(a,b){return(b.video.published_at||'').localeCompare(a.video.published_at||'')});
  // 같은 영화 연속 방지
  var deduped=[],lastTmdb=null;
  items.forEach(function(x){
    if(x.movie.tmdb_id&&x.movie.tmdb_id===lastTmdb){deduped.splice(Math.min(deduped.length,deduped.length-3+Math.floor(Math.random()*3)),0,x);}
    else{deduped.push(x);}
    lastTmdb=x.movie.tmdb_id;
  });
  CUR=deduped;
  SHOWN=0;
  document.getElementById('info').textContent='';
  document.getElementById('list').innerHTML='';
  loadMore();
}

  LOADING=true;
  var items=CUR.slice(SHOWN,SHOWN+PAGE);
  var startIdx=SHOWN;
  var html=items.map(function(x,i){
    var idx=startIdx+i;
    var adSlot='';
    // [광고 승인 후 활성화] 피드 인피드 광고
    // if(idx>0 && idx%5===0){

function buildGenres(){
  // 장르 인덱스 로드
  fetch('data/genres.json').then(function(r){return r.json()}).then(function(idx){
    window.GENRE_INDEX=idx;
  }).catch(function(){window.GENRE_INDEX={};});

  var counts={};
  DATA.forEach(function(x){(x.movie.genres||[]).forEach(function(g){
    if(['TV 영화','음악','역사','가족','서부','모험','전쟁','다큐멘터리'].indexOf(g)<0)counts[g]=(counts[g]||0)+1;
  })});
  var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]}).slice(0,12);
  var el=document.getElementById('genres');
  el.innerHTML='<span class="on" data-g="전체">전체</span>'+sorted.map(function(g){
    var label=g==='애니메이션'?'ANI':g;
    return '<span data-g="'+g+'">'+label+'</span>';
  }).join('');
  el.addEventListener('click',function(e){
    var t=e.target;if(!t.dataset.g)return;
    el.querySelectorAll('span').forEach(function(s){s.className=''});
    t.className='on';
    GENRE=t.dataset.g;
    location.hash=GENRE==='전체'?'':GENRE;
    // 장르 버튼 텍스트 업데이트 + 드롭다운 닫기
    var gb=document.getElementById('genre-btn');
    gb.textContent=GENRE==='전체'?'🎬 장르 ▾':'🎬 '+GENRE+' ▾';
    gb.className=GENRE==='전체'?'fbtn':'fbtn genre-active';
    document.getElementById('genre-dropdown').style.display='none';
    gtag('event','genre_click',{genre:GENRE});
    render();
  });
}

function openPlayer(item){
  var v=item.video,m=item.movie;
  document.getElementById('p-if').src='https://www.youtube.com/embed/'+v.id+'?autoplay=1';
  document.getElementById('p-t').textContent=m.title_ko||m.title_en||'';
  document.getElementById('p-ch').textContent=v.channel;
  document.getElementById('p-m').textContent=(m.year||'')+' · '+(m.director||'')+' · TMDB ⭐'+(m.vote_average||0).toFixed(1);
  // 리뷰 표시
  var reviewEl=document.getElementById('p-review'),reviewText=document.getElementById('p-review-text');
  if(m.ai_review){
    reviewEl.style.display='';
    reviewText.innerHTML=m.ai_review.replace(/\n/g,'<br>');
  } else {
    reviewEl.style.display='none';
  }
  // [광고 승인 후 활성화] 플레이어 광고
  // var pAd=document.getElementById('p-ad');
  // if(pAd){
  //   pAd.innerHTML='<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6740102719021736" data-ad-slot="PLAYER_AD_SLOT" data-ad-format="rectangle" data-full-width-responsive="true"></ins>';
  //   try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  // }
  // 버튼 상태 (자동 기록 안 함, 유저 직접 클릭 시에만)
  window._currentItem=item;
  var wb=document.getElementById('p-watched');
  if(isWatched(v.id)){wb.className='p-btn watched';wb.textContent='✓ 봤어요';}
  else{wb.className='p-btn';wb.textContent='봤어요';}
  savedScroll=window.scrollY;
  document.getElementById('player').className='player on';
  document.body.style.overflow='hidden';
  if(m.tmdb_id) history.replaceState(null,'','#movie/'+m.tmdb_id);
  gtag('event','video_play',{movie:m.title_ko||m.title_en,channel:v.channel,video_id:v.id});

  // 비슷한 영화 추천 (같은 장르 + 비슷한 평점)
  var myGenres=m.genres||[];
  var myRating=m.vote_average||0;
  var similar=DATA.filter(function(x){
    if(x.movie.tmdb_id===m.tmdb_id)return false;
    var xg=x.movie.genres||[];
    var overlap=myGenres.filter(function(g){return xg.indexOf(g)>=0}).length;
    return overlap>=1;
  });
  // 장르 겹침 많고 + 평점 비슷한 순
  similar.sort(function(a,b){
    var ag=(a.movie.genres||[]).filter(function(g){return myGenres.indexOf(g)>=0}).length;
    var bg=(b.movie.genres||[]).filter(function(g){return myGenres.indexOf(g)>=0}).length;
    if(bg!==ag)return bg-ag;
    return Math.abs((a.movie.vote_average||0)-myRating)-Math.abs((b.movie.vote_average||0)-myRating);
  });
  // 같은 영화 중복 제거
  var seenTmdb={};
  var uniqueSimilar=[];
  similar.forEach(function(x){if(!seenTmdb[x.movie.tmdb_id]){seenTmdb[x.movie.tmdb_id]=1;uniqueSimilar.push(x);}});
  var simEl=document.getElementById('p-similar');
  simEl.innerHTML=uniqueSimilar.slice(0,5).map(function(x){
    var sm=x.movie,sv=x.video;
    return '<div style="display:flex;gap:10px;padding:8px;background:#1A1A1A;border-radius:10px;margin-bottom:6px;cursor:pointer" onclick="openPlayer(DATA['+DATA.indexOf(x)+'])">'+
      (sm.poster_url?'<img src="'+sm.poster_url+'" style="width:40px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0">':'')+
      '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(sm.title_ko||sm.title_en)+'</div>'+
      '<div style="font-size:10px;color:#999;margin-top:2px">'+(sm.year||'')+' · ⭐'+(sm.vote_average?sm.vote_average.toFixed(1):'-')+'</div>'+
      '<div style="font-size:10px;color:#666;margin-top:2px">'+sv.channel+'</div></div></div>';
  }).join('');
}

function shareMovie(){
  if(!window._currentItem)return;
  var m=window._currentItem.movie;
  var url='https://dontwatchall.com/#movie/'+m.tmdb_id;
  var text=(m.title_ko||m.title_en)+' - 결말포함 영화 리뷰';
  if(navigator.share){
    navigator.share({title:text,url:url}).catch(function(){});
  }else{
    navigator.clipboard.writeText(url).then(function(){alert('링크가 복사되었습니다!');});
  }
  gtag('event','share',{movie:m.title_ko||m.title_en});
}

// 이벤트
document.getElementById('p-close').addEventListener('click',closePlayer);
var savedScroll=0;
function closePlayer(){
  document.getElementById('player').className='player';
  document.getElementById('p-if').src='';
  document.body.style.overflow='';

// 스와이프로 플레이어 닫기
(function(){
  var startX=0,startY=0;
  var pl=document.getElementById('player');
  pl.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
  pl.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    if(dx>80&&Math.abs(dy)<100) closePlayer(); // 오른쪽 스와이프
  },{passive:true});
})();

document.getElementById('list').addEventListener('click',function(e){

document.getElementById('tabs').addEventListener('click',function(e){
  var btn=e.target.closest('button');
  if(!btn)return;
  var tab=btn.dataset.tab;
  TAB=tab;
  gtag('event','tab_click',{tab:tab});
  document.querySelectorAll('#tabs button').forEach(function(b){b.className=''});
  btn.className='on';
  document.getElementById('v-feed').style.display=tab==='feed'?'':'none';
  document.getElementById('v-today').style.display=tab==='today'?'':'none';
  document.getElementById('v-search').style.display=tab==='search'?'':'none';
  document.querySelector('.sticky-filter').style.display=tab==='feed'?'':'none';
  setTimeout(function(){var ts=document.querySelector('.top-sticky');if(ts){var h=ts.offsetHeight+'px';document.querySelectorAll('.content-area').forEach(function(el){el.style.paddingTop=h;});}},10);
  if(tab==='feed')render();
  if(tab==='today'){
    localStorage.setItem('dwia_today_seen',new Date().toDateString());
    var tb=document.getElementById('tab-today');
    if(tb)tb.textContent='오늘 이거 어때';

  }
});

// 검색 실행
function doSearch(){
  var q=qInput.value.trim().toLowerCase();
  var el=document.getElementById('slist');
  qSuggest.style.display='none';
  if(!q){el.innerHTML='<div class="empty">🔍 영화 제목으로 검색하세요</div>';return;}
  var res=DATA.filter(function(x){
    return((x.movie.title_ko||'').toLowerCase().indexOf(q)>=0)||((x.movie.title_en||'').toLowerCase().indexOf(q)>=0);
  });
  if(!res.length){el.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  gtag('event','search',{query:q,results:res.length});
  el.innerHTML=res.slice(0,30).map(function(x,i){
    var v=x.video,m=x.movie;
    var genres=(m.genres||[]).filter(function(g){return['TV 영화','음악','역사','가족','서부','전쟁'].indexOf(g)<0}).slice(0,2).join(' · ');
    return '<div class="card" style="cursor:pointer" onclick="openPlayer(DATA['+DATA.indexOf(x)+'])">'+
      '<div class="card-img"><img src="https://img.youtube.com/vi/'+v.id+'/mqdefault.jpg" loading="lazy">'+
      (v.duration_label?'<span class="card-dur">'+v.duration_label+'</span>':'')+
      '</div><div class="card-bd"><div class="card-row">'+
      (m.poster_url?'<div class="card-poster"><img src="'+m.poster_url+'" loading="lazy"></div>':'')+
      '<div class="card-info"><div class="card-title">'+(m.title_ko||m.title_en)+'</div>'+
      '<div class="card-meta">'+(m.vote_average?'<span class="star">⭐ '+m.vote_average.toFixed(1)+'</span>':'')+
      (m.year?'<span>'+m.year+'</span>':'')+(genres?'<span>'+genres+'</span>':'')+'</div>'+
      '<div class="card-rt">'+(m.vote_average?'<span class="rt rt-t">TMDB '+m.vote_average.toFixed(1)+'</span>':'')+
      (m.imdb_rating?'<span class="rt rt-i">IMDb '+m.imdb_rating+'</span>':'')+
      (m.rotten_tomatoes?'<span class="rt rt-r">🍅 '+m.rotten_tomatoes+'%</span>':'')+
      '</div></div></div>'+
      '<div class="card-vt">'+v.title+'</div>'+
      '<div class="card-st"><span>'+v.channel+'</span><span>조회수 '+fmt(v.view_count||0)+'</span></div></div></div>';
  }).join('');
}
qInput.addEventListener('input',doSearch);
qInput.addEventListener('search',doSearch);

// 로드
fetch('data/feed.json').then(function(r){return r.json()}).then(function(d){
  DATA=d.items||[];
  buildGenres();
  // URL 해시에서 장르 또는 영화 복원
  var hash=decodeURIComponent(location.hash.replace('#',''));
  if(hash && hash.indexOf('movie/')=== 0){
    // 개별 영화 링크: #movie/{tmdb_id}
    var tmdbId=parseInt(hash.replace('movie/',''));
    var found=DATA.filter(function(x){return x.movie.tmdb_id===tmdbId});
    if(found.length>0){
      setTimeout(function(){openPlayer(found[0]);},300);
    }
  } else if(hash){
    GENRE=hash;
    var chips=document.getElementById('genres').querySelectorAll('span');
    chips.forEach(function(s){s.className=s.dataset.g===hash?'on':'';});
  }
  render();
  renderToday();
  // "오늘 이거 어때" NEW 뱃지
  var lastVisit=localStorage.getItem('dwia_today_seen');
  var todaySeed=new Date().toDateString();
  if(lastVisit!==todaySeed){
    var tb=document.getElementById('tab-today');
    if(tb)tb.innerHTML='오늘 이거 어때 <span class="new-dot"></span>';
  }
}).catch(function(){
  document.getElementById('list').innerHTML='<div class="empty">데이터를 불러올 수 없습니다</div>';
});
</script>
